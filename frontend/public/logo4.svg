<svg viewBox="100 0 450 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Rainbow Circles -->
  <g transform="translate(225, 85)">
    <!-- Outer pink/magenta circle -->
    <circle cx="0" cy="0" r="85" fill="#E91E63" stroke="none"/>
    <circle cx="0" cy="0" r="75" fill="white" stroke="none"/>
    
    <!-- Yellow circle -->
    <circle cx="0" cy="0" r="70" fill="#FFC107" stroke="none"/>
    <circle cx="0" cy="0" r="60" fill="white" stroke="none"/>
    
    <!-- Green circle -->
    <circle cx="0" cy="0" r="55" fill="#4CAF50" stroke="none"/>
    <circle cx="0" cy="0" r="45" fill="white" stroke="none"/>
    
    <!-- Blue inner circle -->
    <circle cx="0" cy="0" r="40" fill="#2196F3" stroke="none"/>
    <circle cx="0" cy="0" r="30" fill="white" stroke="none"/>
    
    <!-- Small gaps in the rings at top and bottom -->
    <rect x="-5" y="-90" width="10" height="15" fill="white" />
    <rect x="-5" y="75" width="10" height="15" fill="white" />
  </g>
  
  <!-- Text "Garba Groove" -->
  <g transform="translate(225, 225)">
    <text x="-220" y="0" font-family="Arial, sans-serif" font-weight="bold" font-size="60" fill="#3F51B5" text-anchor="start">Garba Groove</text>
  </g>
</svg>